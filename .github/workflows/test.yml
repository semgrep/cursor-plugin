name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  read-version:
    name: Read Minimum Semgrep Version
    runs-on: ubuntu-latest
    outputs:
      min_version: ${{ steps.read.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: read
        run: |
          if [ -f "semgrep-version" ]; then
            echo "version=$(cat semgrep-version)" >> $GITHUB_OUTPUT
          else
            echo "version=1.146.0" >> $GITHUB_OUTPUT
          fi

  test-hooks:
    name: Test Hooks (Semgrep ${{ matrix.semgrep_version }})
    needs: read-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        semgrep_version:
          - ${{ needs.read-version.outputs.min_version }}
          - latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install Semgrep
        run: |
          if [ "${{ matrix.semgrep_version }}" = "latest" ]; then
            uv tool install semgrep
          else
            uv tool install semgrep==${{ matrix.semgrep_version }}
          fi

      - name: Verify Semgrep installation
        run: semgrep --version

      - name: Test version check script
        run: |
          if [ -f "scripts/check_version.sh" ]; then
            chmod +x scripts/check_version.sh
            ./scripts/check_version.sh
          else
            echo "No version check script yet (will be synced from template)"
          fi
